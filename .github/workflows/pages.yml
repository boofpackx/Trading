name: Deploy demo to GitHub Pages

# Publishes docs/ to the gh-pages branch, which GitHub Pages serves.
# (The gh-pages branch approach is used because the Actions token cannot
# create a Pages site itself — pushing gh-pages auto-enabled the site.)

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish docs/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          enable_jekyll: false
